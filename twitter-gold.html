<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحميل تويتر الذهبي - التفاصيل</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --main: #fbbf24; --secondary: #d97706; }
        body { background: #f8fafc; font-family: 'Tajawal', sans-serif; margin: 0; padding: 0; }
        header { background: #fff; padding: 15px; text-align: center; border-bottom: 3px solid var(--main); }
        .logo { font-size: 24px; font-weight: bold; color: var(--main); text-decoration: none; }
        .container { max-width: 700px; margin: 20px auto; padding: 20px; background: #fff; border-radius: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .app-title { font-size: 24px; color: #0f172a; margin-bottom: 20px; text-align: center; }
        
        /* الجدول الاحترافي */
        .spec-table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        .spec-table td { padding: 12px; border-bottom: 1px solid #f1f5f9; }
        .spec-table td:first-child { font-weight: bold; color: #64748b; width: 40%; }
        
        .download-btn { 
            display: block; text-align: center; background: linear-gradient(45deg, var(--main), var(--secondary));
            color: #fff; text-decoration: none; padding: 18px; border-radius: 50px; font-weight: bold; font-size: 20px; margin-top: 30px;
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">تطبيقات الذهبي</a>
</header>

<div class="container">
    <h1 class="app-title">تويتر الذهبي الإصدار الأخير v5.20</h1>
    <p>هنا تضع وصف المقال الطويل والشرح الخاص بمميزات التطبيق...</p>
    
    <table class="spec-table">
        <tr><td>اسم الملف</td><td>Twitter Gold</td></tr>
        <tr><td>الإصدار</td><td>5.20</td></tr>
        <tr><td>الحجم</td><td>68 MB</td></tr>
    </table>

    <a href="رابط_التحميل_المباشر" class="download-btn">📥 تحميل الآن برابط مباشر</a>
</div>

</body>
</html>
